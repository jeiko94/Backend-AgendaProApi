name: Build and deploy ASP.Net Core app to Azure Web App - desarrollosoftware

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./Backend-AgendaProApi.Api/Backend-AgendaProApi.Api.csproj

      - name: Build
        run: dotnet build ./Backend-AgendaProApi.Api/Backend-AgendaProApi.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./Backend-AgendaProApi.Api/Backend-AgendaProApi.Api.csproj -c Release -o ${{ github.workspace }}/publish --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_17AAC18539CB497AA44C765DE4D635E4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8BB4C2DE7AF240E0A301BF01474456B9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6D82194C87814334BFBAAB0FEEB38ED8 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'desarrollosoftware'
          slot-name: 'Production'
          package: ${{ github.workspace }}/publish


